<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For You</title>

<style>
body {
    margin: 0;
    font-family: 'Courier New', monospace;
    overflow-y: scroll;
    background: radial-gradient(circle at center, #f5e6c8 0%, #e8d3a5 100%);
}

body::-webkit-scrollbar {
    display: none;
}

body::before {
    content: "";
    position: fixed;
    inset: 20px;
    border: 2px solid #a67c52;
    pointer-events: none;
}

/* Envelope Section */
.envelope-container {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

.envelope {
    width: 320px;
    height: 200px;
    background: #d2a679;
    position: relative;
    border-radius: 6px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.4);
    cursor: pointer;
}

.flap {
    position: absolute;
    width: 100%;
    height: 100%;
    background: #c89b6d;
    clip-path: polygon(0 0, 50% 65%, 100% 0);
    transform-origin: top;
    transition: transform 1s ease;
}

.open .flap {
    transform: rotateX(180deg);
}

.seal {
    position: absolute;
    width: 45px;
    height: 45px;
    background: #6b1f1f;
    border-radius: 50%;
    top: 70px;
    left: 135px;
    box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
}

.hint {
    margin-top: 25px;
    color: #5a3e2b;
    font-size: 16px;
}

/* Letter */
.letter {
    max-width: 750px;
    margin: 120px auto;
    padding: 50px;
    background: #fdf6e3;
    border-radius: 10px;
    display: none;
    box-shadow: 0 10px 40px rgba(0,0,0,0.4);
    position: relative;
}

.letter::before {
    content: "";
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
        transparent,
        transparent 28px,
        rgba(0,0,0,0.05) 29px
    );
    pointer-events: none;
}

.show {
    display: block;
    animation: fadeUp 2s ease;
}

@keyframes fadeUp {
    from { opacity: 0; transform: translateY(80px); }
    to { opacity: 1; transform: translateY(0); }
}

h2 {
    text-align: center;
    color: #5a3e2b;
    margin-bottom: 30px;
}

#text {
    white-space: pre-line;
    font-size: 18px;
    line-height: 1.9;
    color: #3e2f1c;
}

.cursor {
    display: inline-block;
    width: 8px;
    height: 18px;
    background: #3e2f1c;
    animation: blink 1s infinite;
}

@keyframes blink {
    50% { opacity: 0; }
}
</style>
</head>

<body>

<!-- Envelope -->
<div class="envelope-container" onclick="openLetter()">
    <div class="envelope" id="env">
        <div class="flap"></div>
        <div class="seal"></div>
    </div>
    <p class="hint">Click to open 💛</p>
</div>

<!-- Letter -->
<div class="letter" id="letter">
    <h2>Hello Mr. Abhinav</h2>
    <p id="text"></p><span class="cursor"></span>
</div>

<script>

const message = `

I don’t know how to put this... but I have to.

I’ve always seen you as a true friend. College is ending, and maybe we’ll get busy and drift further. That’s why I want to say sorry if I ever hurt you.

I regret that one thing that faded us.  
I never wanted it to end like this.

Just remember me as a good friend. Because you were one to me.

Thanks for being you. Thanks for my bday treat — you made my day.

You’re one of the best people I know — kind, considerate, genuine, and chill.

We may have talked less, but you’re still special to me.

If I could go back, I would change one thing about our friendship.

You’ll always be a good part of my life.

Wishing you good luck for your bright future.

Stay healthy, keep smiling, and take care.

Hope you achieve what you desire.

— Devika
`;

let i = 0;

function typeWriter() {
    if (i < message.length) {
        document.getElementById("text").innerHTML += message.charAt(i);
        i++;
        setTimeout(typeWriter, 40);
    }
}

function openLetter() {
    document.getElementById("env").classList.add("open");

    setTimeout(() => {
        document.querySelector(".envelope-container").style.display = "none";
        document.getElementById("letter").classList.add("show");

        window.scrollTo({
            top: document.body.scrollHeight,
            behavior: "smooth"
        });

        typeWriter();
    }, 1000);
}

</script>

</body>
</html>
